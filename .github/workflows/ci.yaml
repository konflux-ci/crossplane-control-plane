name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]

permissions: read-all

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run kustomize build
        id: kube-linter-action-scan
        shell: bash
        run: |
          mkdir manifests
          kustomize build --enable-helm crossplane/ > manifests/crossplane.yaml
          kustomize build config/ > manifests/config.yaml

      # This prepares directory where github/codeql-action/upload-sarif@v1 looks up report files by default.
      - name: Create results directory for SARIF report files
        shell: bash
        run: mkdir -p ../results

      - name: Scan with kube-linter
        uses: stackrox/kube-linter-action@v1.0.7
        with:
          directory: manifests
          format: sarif
          output-file: ../results/kube-linter.sarif
        continue-on-error: true

      - name: Upload SARIF report files to GitHub
        uses: github/codeql-action/upload-sarif@v4

      # Ensure the workflow eventually fails if files did not pass kube-linter checks.
      - name: Verify kube-linter-action succeeded
        shell: bash
        run: |
          echo "If this step fails, kube-linter found issues. Check the output of the scan step above."
          [[ "${{ steps.kube-linter-action-scan.outcome }}" == "success" ]]

      - name: Verify AGENTS.md line count
        shell: bash
        run: |
          max_lines=300
          line_count=$(wc -l < AGENTS.md)
          echo "AGENTS.md has $line_count lines (max: $max_lines)"
          if [ "$line_count" -ge "$max_lines" ]; then
            echo "AGENTS.md exceeds the $max_lines-line limit"
            exit 1
          fi

  deploy-test-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Deploy
        shell: bash
        run: ./scripts/deploy.sh

      - name: Test XNamespaces
        shell: bash
        run: ./scripts/test-xnamespaces.sh

      - name: Test XTestPlatformCluster
        shell: bash
        run: ./scripts/test-xtestplatformcluster.sh

      - name: Cleanup
        shell: bash
        run: ./scripts/cleanup.sh
