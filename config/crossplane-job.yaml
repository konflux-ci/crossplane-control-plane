apiVersion: batch/v1
kind: Job
metadata:
  name: crossplane-install-job
  namespace: crossplane-system
spec:
  template:
    spec:
      containers:
      - name: crossplane-installer
        image: bitnami/kubectl:latest
        command: 
          - /bin/bash
          - "-c"
          - |
            chmod +x /scripts/install-crossplane-helm.sh
            /scripts/install-crossplane-helm.sh
        volumeMounts:
          - name: install-script
            mountPath: /scripts
      restartPolicy: Never
      volumes:
        - name: install-script
          configMap:
            name: crossplane-install-map
