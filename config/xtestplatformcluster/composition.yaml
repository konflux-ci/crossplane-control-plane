---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: testplatform-ephemeral-cluster
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  writeConnectionSecretsToNamespace: crossplane-connections
  compositeTypeRef:
    apiVersion: ci.openshift.org/v1alpha1
    kind: XTestPlatformCluster
  mode: Pipeline
  pipeline:
  - step: create-ephemeral-cluster
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: FileSystem
      fileSystem:
        dirPath: /templates/xtestplatformcluster/create-ephemeral-cluster.yaml

  - step: report-conditions
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: FileSystem
      fileSystem:
        dirPath: /templates/xtestplatformcluster/report-conditions.yaml

  - step: observe-credentials-secret
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: FileSystem
      fileSystem:
        dirPath: /templates/xtestplatformcluster/observe-credentials-secret.yaml

  - step: write-connection-details
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: credentials
        connectionDetails:
        - name: kubeconfig
          type: FromConnectionSecretKey
          fromConnectionSecretKey: kubeconfig
        - name: kubeAdminPassword
          type: FromConnectionSecretKey
          fromConnectionSecretKey: kubeAdminPassword

  - step: auto-detect-ready-composed-resources
    functionRef:
      name: function-auto-ready
