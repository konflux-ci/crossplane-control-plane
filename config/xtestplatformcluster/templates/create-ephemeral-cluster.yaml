apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
kind: ExtraResources
requirements:
  envcfg:
    apiVersion: apiextensions.crossplane.io/v1beta1
    kind: EnvironmentConfig
    matchName: envcfg

---
{{- if .extraResources.envcfg.items }}
apiVersion: kubernetes.crossplane.io/v1alpha2
kind: Object
metadata:
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: ec
  name: managed-{{ .observed.composite.resource.metadata.name }}
spec:
  forProvider:
    manifest:
      apiVersion: ci.openshift.io/v1
      kind: EphemeralCluster
      metadata:
        name: {{ .observed.composite.resource.metadata.name }}
        namespace: ephemeral-cluster
        annotations:
          ephemeralcluster.ci.openshift.io/konflux-tenant: {{ .observed.composite.resource.spec.claimRef.namespace }}
          ephemeralcluster.ci.openshift.io/konflux-cluster: {{ (first .extraResources.envcfg.items).resource.data.clusterName }}
      spec:
        ciOperator: {{ .observed.composite.resource.spec.ciOperator|toPrettyJson }}
{{- if hasKey .observed.composite.resource.spec "tearDownCluster" }}
        tearDownCluster: {{ .observed.composite.resource.spec.tearDownCluster }}
{{- end }}
  readiness:
    policy: DeriveFromCelQuery
    celQuery: |
      has(object.status) && has(object.status.conditions) &&
      object.status.conditions.exists(c, c.type == 'ClusterReady' && c.status == 'True')
  watch: true
  providerConfigRef:
    name: testplatform-kubernetes-provider-config
{{- end }}
